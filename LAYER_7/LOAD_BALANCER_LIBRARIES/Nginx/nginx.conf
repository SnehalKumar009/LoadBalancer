# NGINX as L7 reverse proxy / load balancer in front of app1..app4.
# Drop-in alternative to the ATS container — listens on the same internal
# ports (8080 = proxy traffic, 8081 = stats endpoint) so the host port
# mappings in docker-compose.yml stay identical when you swap LBs.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # Explicit upstream list (one entry per backend) instead of relying on
    # the shared "backend" DNS alias. This gives us per-server health flags
    # (max_fails / fail_timeout), weights and easy failover tuning.
    # Default LB algorithm is round-robin — matches ATS strict_round_robin.
    upstream backend_pool {
        server app1:8080 max_fails=3 fail_timeout=5s;
        server app2:8080 max_fails=3 fail_timeout=5s;
        server app3:8080 max_fails=3 fail_timeout=5s;
        server app4:8080 max_fails=3 fail_timeout=5s;
    }

    # ---- Proxy listener (host 8088 -> container 8080) ----
    server {
        listen 8080;

        location / {
            proxy_pass http://backend_pool;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ---- Stats listener (host 8081 -> container 8081) ----
    # Parallel to ATS stats_over_http /_stats endpoint.
    # nginx-prometheus-exporter sidecar scrapes /stub_status here and
    # re-exposes the data in Prometheus format on its own port 9113.
    server {
        listen 8081;

        location /stub_status {
            stub_status;
            allow all;   # POC only — restrict to the lbnet subnet in prod
        }
    }
}
