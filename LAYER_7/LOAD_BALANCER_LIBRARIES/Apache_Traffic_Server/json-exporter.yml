# json-exporter config — translates ATS `/_stats` (JSON) into Prometheus metrics.
# Loaded by the `ats-exporter` sidecar in docker-compose.yml.
#
# ATS /_stats returns:
#   {
#     "global": {
#       "proxy.process.http.completed_requests": "12345",
#       "proxy.process.http.2xx_responses":      "12000",
#       ...
#     }
#   }
#
# The dots inside keys break gjson's normal "{.a.b.c}" path syntax, so we
# pull the whole `.global` object once (type=object) and extract each
# metric with a sub-path that quotes the literal key. This avoids any
# escape-character ambiguity with the YAML/template/gjson pipeline.

modules:
  ats:
    metrics:
      - name: ats
        type: object
        path: '{.global}'
        help: 'Apache Traffic Server core HTTP stats (from /_stats)'
        values:
          http_completed_requests:                       '{.["proxy.process.http.completed_requests"]}'
          http_current_client_connections:               '{.["proxy.process.http.current_client_connections"]}'
          http_total_client_connections:                 '{.["proxy.process.http.total_client_connections"]}'
          http_2xx_responses:                            '{.["proxy.process.http.2xx_responses"]}'
          http_4xx_responses:                            '{.["proxy.process.http.4xx_responses"]}'
          http_5xx_responses:                            '{.["proxy.process.http.5xx_responses"]}'
          http_origin_server_response_document_total_size: '{.["proxy.process.http.origin_server_response_document_total_size"]}'

