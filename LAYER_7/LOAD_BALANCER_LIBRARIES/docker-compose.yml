
services:
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    image: ats-l4-poc-app:local
    container_name: app1
    environment:
      APP_ID: app1
    networks:
      lbnet:
        aliases:
          - backend

  app2:
    image: ats-l4-poc-app:local
    container_name: app2
    environment:
      APP_ID: app2
    depends_on:
      - app1
    networks:
      lbnet:
        aliases:
          - backend

  app3:
    image: ats-l4-poc-app:local
    container_name: app3
    environment:
      APP_ID: app3
    depends_on:
      - app1
    networks:
      lbnet:
        aliases:
          - backend

  app4:
    image: ats-l4-poc-app:local
    container_name: app4
    environment:
      APP_ID: app4
    depends_on:
      - app1
    networks:
      lbnet:
        aliases:
          - backend

  ats-lb:
    image: trafficserver/trafficserver:10.1.2
    container_name: ats-lb
    depends_on:
      - app1
      - app2
      - app3
      - app4
    ports:
      - "8088:8080"
      - "8081:8081"
    volumes:
      - ./Apache_Traffic_Server/records.yaml:/opt/etc/trafficserver/records.yaml:ro
      - ./Apache_Traffic_Server/remap.config:/opt/etc/trafficserver/remap.config:ro
      - ./Apache_Traffic_Server/plugin.config:/opt/etc/trafficserver/plugin.config:ro
    networks:
      lbnet:
        aliases:
          - lb     # generic alias so k6 scripts can hit http://lb:8080/
                   # regardless of which LB (ats / nginx) is running.

  # ATS metrics sidecar: tiny Python service that scrapes ATS /_stats (JSON)
  # and re-exposes everything as Prometheus metrics on :9100/metrics.
  # Comment this out together with `ats-lb` when running another LB.
  ats-exporter:
    image: python:3.12-alpine
    container_name: ats-exporter
    command: ["python", "/app/exporter.py"]
    volumes:
      - ./Apache_Traffic_Server/exporter.py:/app/exporter.py:ro
    depends_on:
      - ats-lb
    networks:
      - lbnet

  # ---- NGINX load balancer (alternative to ats-lb above). ----
  # To swap: comment out the entire `ats-lb` block above, then uncomment
  # `nginx-lb` (and optionally `nginx-exporter`) below. Only ONE LB can run
  # at a time — both bind the same host ports (8088 + 8081).
  #
  # nginx-lb:
  #   image: nginx:1.27-alpine
  #   container_name: nginx-lb
  #   depends_on:
  #     - app1
  #     - app2
  #     - app3
  #     - app4
  #   ports:
  #     - "8088:8080"   # proxy traffic    (same external port as ats-lb)
  #     - "8081:8081"   # stub_status      (same external port as ats-lb)
  #   volumes:
  #     - ./Nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   networks:
  #     lbnet:
  #       aliases:
  #         - lb     # same generic alias the k6 scripts use
  #
  # nginx-exporter:
  #   image: nginx/nginx-prometheus-exporter:1.3.0
  #   container_name: nginx-exporter
  #   command:
  #     - "--nginx.scrape-uri=http://nginx-lb:8081/stub_status"
  #   depends_on:
  #     - nginx-lb
  #   networks:
  #     - lbnet

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    privileged: true
    # --docker_only restricts cAdvisor to Docker-managed cgroups so every
    # metric carries the `name`, `image`, and `container_label_*` labels
    # (without this, on cgroup-v2 hosts we only get raw `id=/system.slice/...`
    # series with no container name -> Grafana panels show "No Data").
    #
    # --disable_metrics=disk,diskIO  ->  skip the read-write layer ID lookup,
    # which fails on Docker setups that use the containerd image snapshotter
    # (the new default on recent kernels). When that lookup fails, cAdvisor
    # refuses to register the container at all, again breaking the `name`
    # label. Disabling disk stats lets it proceed.
    command:
      - "--docker_only=true"
      - "--store_container_labels=false"
      - "--housekeeping_interval=5s"
      - "--disable_metrics=disk,diskIO"
    ports:
      - "8089:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - lbnet

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - cadvisor
      - app1
      - app2
      - app3
      - app4
    networks:
      - lbnet

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - lbnet

  traffic:
    image: grafana/k6:0.52.0
    container_name: traffic
    working_dir: /scripts
    environment:
      NO_PROXY: lb,ats-lb,nginx-lb,ats-exporter,nginx-exporter,app1,app2,app3,app4,backend,localhost,127.0.0.1
      no_proxy: lb,ats-lb,nginx-lb,ats-exporter,nginx-exporter,app1,app2,app3,app4,backend,localhost,127.0.0.1
    volumes:
      - ./k6:/scripts:ro
    entrypoint: ["sleep", "infinity"]
    networks:
      - lbnet

  netshoot:
    image: nicolaka/netshoot:latest
    container_name: netshoot
    command: ["sleep", "infinity"]
    networks:
      - lbnet

networks:
  lbnet:
    driver: bridge

