global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: spring-apps
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app1:8080", "app2:8080", "app3:8080", "app4:8080"]

  # Per-container CPU + memory via the in-house docker-stats-exporter
  # (Python sidecar that talks to /var/run/docker.sock and emits the same
  # `container_cpu_usage_seconds_total` / `container_memory_working_set_bytes`
  # metrics that cAdvisor would, but works on hosts using the containerd
  # image snapshotter where cAdvisor breaks).
  - job_name: docker-stats
    static_configs:
      - targets: ["docker-stats-exporter:9100"]

  # ATS metrics via the in-house exporter sidecar (Python script that
  # translates ATS /_stats JSON -> Prometheus exposition text).
  - job_name: ats
    static_configs:
      - targets: ["ats-exporter:9100"]

  # Uncomment when running the NGINX load balancer (nginx-exporter sidecar
  # translates nginx stub_status -> Prometheus metrics on port 9113).
  # - job_name: nginx
  #   static_configs:
  #     - targets: ["nginx-exporter:9113"]

