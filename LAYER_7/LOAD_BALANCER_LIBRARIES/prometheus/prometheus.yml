global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: spring-apps
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app1:8080", "app2:8080", "app3:8080", "app4:8080"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

