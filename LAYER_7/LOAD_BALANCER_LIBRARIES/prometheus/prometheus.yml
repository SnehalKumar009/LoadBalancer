global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: spring-apps
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app1:8080", "app2:8080", "app3:8080", "app4:8080"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # ATS metrics via the in-house exporter sidecar (Python script that
  # translates ATS /_stats JSON -> Prometheus exposition text).
  - job_name: ats
    static_configs:
      - targets: ["ats-exporter:9100"]

  # Uncomment when running the NGINX load balancer (nginx-exporter sidecar
  # translates nginx stub_status -> Prometheus metrics on port 9113).
  # - job_name: nginx
  #   static_configs:
  #     - targets: ["nginx-exporter:9113"]

