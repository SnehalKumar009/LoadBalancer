global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: spring-apps
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app1:8080", "app2:8080", "app3:8080", "app4:8080"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # ATS metrics via json-exporter sidecar (probe-style scrape).
  # Prometheus passes the ATS /_stats URL as ?target=...; json-exporter
  # fetches it, converts to Prometheus format, and returns the result.
  - job_name: ats
    metrics_path: /probe
    params:
      module: [ats]
    static_configs:
      - targets:
          - 'http://ats-lb:8081/_stats'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: ats-exporter:7979

  # Uncomment when running the NGINX load balancer (nginx-exporter sidecar
  # translates nginx stub_status -> Prometheus metrics on port 9113).
  # - job_name: nginx
  #   static_configs:
  #     - targets: ["nginx-exporter:9113"]

