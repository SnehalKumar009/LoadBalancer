# Apache Traffic Server 10.x configuration.
# This replaces the legacy records.config (removed in ATS 10).
# Each setting maps from "proxy.config.<a>.<b>.<c>" to nested keys under "records:".
records:
  diags:
    debug:
      enabled: 1
      tags: http|dns|hostdb|parent_select
  http:
    server_ports: '8080'
    parent_proxy_routing_enable: 1
    cache:
      http: 0
  reverse_proxy:
    enabled: 1
  url_remap:
    remap_required: 1
  log:
    logging_enabled: 3

