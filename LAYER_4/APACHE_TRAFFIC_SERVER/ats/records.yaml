# Apache Traffic Server 10.x configuration.
# This replaces the legacy records.config (removed in ATS 10).
# Each setting maps from "proxy.config.<a>.<b>.<c>" to nested keys under "records:".
records:
  diags:
    debug:
      enabled: 1
      tags: http|dns|hostdb
  http:
    # 8080 = proxy/LB traffic, 8081 = stats_over_http (/_stats) endpoint.
    server_ports: '8080 8081'
    cache:
      http: 0
  hostdb:
    # Rotate evenly across all A-records returned for "backend" (app1..app4)
    # so each request lands on the next backend -> L7 load balancing.
    strict_round_robin: 1
  reverse_proxy:
    enabled: 1
  url_remap:
    remap_required: 1
  log:
    logging_enabled: 3

